<div class="board">
    <div class="card-stack">

        <!-- card stack -->
        @for (card of [0, 1, 2, 3]; track $index) {
            <img [ngStyle]="{'right': $index * 3 + 'px'}" src="../../assets/img/cards/card_cover.png" alt="">
        }

        <!-- stack of played cards -->
        <img (click)="pickCard($event)" class="top-card" style="right: 20px;" src="../../assets/img/cards/card_cover.png" alt="">
        
        <!-- current card (animation) -->
        @for (card of game!.playedCards; track $index) {
            <img src="../../assets/img/cards/{{ card }}.png" class="played-card" alt="">
        }

        <img (click)="pickCard($event)" *ngIf="pickCardAnimation" class="pick-card" style="right: 20px;" src="../../assets/img/cards/{{ currentCard }}.png" alt="">
    </div>
</div>
